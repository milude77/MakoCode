name: Build Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v1.6.5)'
        required: true
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build installer (skip auto-publish)
        run: npm run build -- --publish never

      - name: Upload to Release
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          gh release create $tag dist/*.exe dist/*.blockmap dist/*.yml --title "MakoCode $tag" --notes "Auto-built from tag $tag." --draft=false --prerelease=false --repo ${{ github.repository }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload installer artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: MakoCode-Installer
          path: dist/*.exe
          retention-days: 7
